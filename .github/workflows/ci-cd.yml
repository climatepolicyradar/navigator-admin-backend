name: CI/CD

on:
  push:
    tags: [v*]
    branches:
      - main
  pull_request:
    # By default, a workflow only runs when a pull_request event's activity type is opened,
    # synchronize, or reopened.
    types: [opened, synchronize, reopened, edited]
    branches:
      - main

permissions: read-all

jobs:
  code-quality:
    if: |
      ! cancelled() && always() &&
      ! startsWith(github.ref, 'refs/tags')
    runs-on: ubuntu-latest
    permissions:
      # For trunk to post annotations
      checks: write
      # For repo checkout
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install "poetry==2.2"
          poetry config virtualenvs.create true
          poetry install --no-cache
          poetry install --only-root

      - name: Export PYTHONPATH
        run: echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV

      - name: Check code contains no FIXME's
        run: |
          git grep -r --no-color ${case_sensitive} --line-number -e "FIXME" :^.github
          if [[ $? -eq 0 ]]; then
            # if we found any FIXME entries in checked in files, fail on main
            exit 1
          else
            exit 0
          fi
        shell: bash {0}

      - name: Trunk Check
        uses: trunk-io/trunk-action@v1
        with:
          arguments: --ci

  unit-test:
    if: |
      ! cancelled() && always() &&
      ! startsWith(github.ref, 'refs/tags')
    runs-on: ubuntu-latest
    steps:
      - name: Install latest Docker Compose
        uses: ndeloof/install-compose-action@v0.0.1
        with:
          legacy: false

      - uses: actions/checkout@v6

      - name: Run Unit Tests
        run: make test TEST=tests/unit_tests/
        env:
          POSTGRES_USER: navigator_admin
          POSTGRES_PASSWORD: password
          POSTGRES_DB: navigator

  integration-test:
    if: |
      ! cancelled() && always() &&
      ! startsWith(github.ref, 'refs/tags')
    runs-on: ubuntu-latest
    steps:
      - name: Install latest Docker Compose
        uses: ndeloof/install-compose-action@v0.0.1
        with:
          legacy: false

      - uses: actions/checkout@v6

      - name: Run Integration Tests
        run: make test TEST=tests/integration_tests
        env:
          POSTGRES_USER: navigator_admin
          POSTGRES_PASSWORD: password
          POSTGRES_DB: navigator
