name: CI/CD

on:
  push:
    tags: [v*]
    branches:
      - main
  pull_request:
    # By default, a workflow only runs when a pull_request event's activity type is opened,
    # synchronize, or reopened.
    types: [opened, synchronize, reopened, edited]
    branches:
      - main

permissions: read-all

jobs:
  code-quality:
    if: |
      ! cancelled() && always() &&
      ! startsWith(github.ref, 'refs/tags')
    permissions:
      # For trunk to post annotations
      checks: write
      # For repo checkout
      contents: read
    uses: climatepolicyradar/reusable-workflows/.github/workflows/python-precommit-validator-without-version.yml@v23
    with:
      python-version: 3.12
      poetry-version: 2.3

  unit-test:
    if: |
      ! cancelled() && always() &&
      ! startsWith(github.ref, 'refs/tags')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - uses: Gr1N/setup-poetry@v9
      - uses: actions/cache@v5
        with:
          path: ~/.cache/pypoetry/virtualenvs
          key: ${{ runner.os }}-poetry-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install

      - name: Run Unit Tests
        run: make unit_tests
        env:
          POSTGRES_USER: navigator_admin
          POSTGRES_PASSWORD: password
          POSTGRES_DB: navigator

  integration-test:
    if: |
      ! cancelled() && always() &&
      ! startsWith(github.ref, 'refs/tags')
    runs-on: ubuntu-latest
    steps:
      - name: Install latest Docker Compose
        uses: ndeloof/install-compose-action@v0.0.1
        with:
          legacy: false

      - uses: actions/checkout@v6

      - name: Run Integration Tests
        run: make integration_tests
        env:
          POSTGRES_USER: navigator_admin
          POSTGRES_PASSWORD: password
          POSTGRES_DB: navigator

  dependabot:
    name: Dependabot Auto-pilot
    needs: [code-quality, unit-test, integration-test]
    permissions:
      pull-requests: write
      contents: write
    uses: climatepolicyradar/reusable-workflows/.github/workflows/dependabot-autopilot.yml@v23
    with:
      auto-approve: false
